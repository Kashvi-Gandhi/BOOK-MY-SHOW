{%  extends "users/basic.html" %}
{% block content %}
<h1>Theater for {{ movie.name }}</h1>
<ul>
    {% for theater in theaters %}
        <li>
            <strong>{{ theater.name }}</strong> ({{ theater.time }})
            
            <a href="{% url 'book_seats' theater.id %}">View Seats</a>
        </li>
    {% endfor %}
</ul>
{% endblock %}
